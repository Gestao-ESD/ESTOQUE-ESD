<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estoque ESD · Entrar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#001342;
    --navy-light:#16295c;
    --gold:#e2a731;
    --blue:#6086c3;
    --bg:#f7f8fb;
    --ink:#10192f;
    --muted:#6b7280;
    --border:#e4e7ee;
    --white:#ffffff;
    --danger:#c0392b;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Inter',sans-serif;
    background:var(--navy);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    overflow:hidden;
    color:var(--ink);
  }
  /* signature wedge motif, echoing the ESD open-book mark */
  .wedge{
    position:absolute;
    bottom:-6%;
    left:-10%;
    width:130%;
    height:38%;
    background:linear-gradient(100deg, var(--blue) 0%, var(--blue) 49.5%, var(--gold) 50.5%, var(--gold) 100%);
    transform:skewY(-4deg);
    opacity:0.9;
  }
  .card{
    position:relative;
    z-index:2;
    background:var(--white);
    width:100%;
    max-width:400px;
    margin:24px;
    border-radius:18px;
    padding:44px 38px 36px;
    box-shadow:0 30px 60px rgba(0,10,40,0.35);
  }
  .logo-wrap{
    display:flex;
    justify-content:center;
    margin-bottom:22px;
  }
  .logo-wrap img{
    width:92px;
    height:92px;
  }
  h1{
    font-family:'Space Grotesk',sans-serif;
    font-size:22px;
    font-weight:700;
    text-align:center;
    color:var(--navy);
    letter-spacing:-0.01em;
  }
  .subtitle{
    text-align:center;
    color:var(--muted);
    font-size:13.5px;
    margin-top:6px;
    margin-bottom:30px;
  }
  label{
    display:block;
    font-size:12.5px;
    font-weight:600;
    color:var(--navy);
    margin-bottom:6px;
    margin-top:16px;
    text-transform:uppercase;
    letter-spacing:0.03em;
  }
  input{
    width:100%;
    padding:12px 14px;
    border:1.5px solid var(--border);
    border-radius:10px;
    font-family:'Inter',sans-serif;
    font-size:14.5px;
    color:var(--ink);
    outline:none;
    transition:border-color .15s ease, box-shadow .15s ease;
    background:#fbfbfd;
  }
  input:focus{
    border-color:var(--blue);
    box-shadow:0 0 0 3px rgba(96,134,195,0.18);
    background:var(--white);
  }
  button{
    width:100%;
    margin-top:26px;
    padding:13px;
    border:none;
    border-radius:10px;
    background:var(--navy);
    color:var(--white);
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:14.5px;
    cursor:pointer;
    transition:background .15s ease, transform .1s ease;
  }
  button:hover{background:var(--navy-light);}
  button:active{transform:scale(0.98);}
  button:disabled{opacity:0.6;cursor:wait;}
  .error{
    margin-top:16px;
    background:#fdecea;
    border:1px solid #f3c6c1;
    color:var(--danger);
    font-size:13px;
    padding:10px 12px;
    border-radius:8px;
    display:none;
  }
  .footer-note{
    text-align:center;
    font-size:11.5px;
    color:var(--muted);
    margin-top:26px;
  }
  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;}
  }
</style>
</head>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // ⚠️ Substitua pelos dados do SEU projeto Firebase (Configurações do projeto > Config do SDK)
    const firebaseConfig = {
      apiKey: "AIzaSyDlrs2kyTlwrXjIOivSth9U5PSOQCPvXvY",
      authDomain: "esd-gestao.firebaseapp.com",
      projectId: "esd-gestao",
      storageBucket: "esd-gestao.firebasestorage.app",
      messagingSenderId: "1047951862397",
      appId: "1:1047951862397:web:622d146434b65eac161f14"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const form = document.getElementById('loginForm');
    const errorBox = document.getElementById('errorBox');
    const submitBtn = document.getElementById('submitBtn');

    // Se já estiver logado, vai direto pro painel
    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = 'painel.html';
    });

    function mostrarErro(msg){
      errorBox.textContent = msg;
      errorBox.style.display = 'block';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Entrando...';

      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;

      try {
        const cred = await signInWithEmailAndPassword(auth, email, senha);
        // Verifica se o usuário tem um setor configurado
        const userDoc = await getDoc(doc(db, 'usuarios', cred.user.uid));
        if (!userDoc.exists() || !userDoc.data().setor) {
          mostrarErro('Sua conta ainda não está associada a um setor. Fale com o administrador do sistema.');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Entrar';
          return;
        }
        window.location.href = 'painel.html';
      } catch (err) {
        console.error(err);
        mostrarErro('E-mail ou senha incorretos.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Entrar';
      }
    });
  </script>

</body>
</html>
